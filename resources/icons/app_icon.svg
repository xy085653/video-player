<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="50%" stop-color="#7c73ff"/>
      <stop offset="100%" stop-color="#5a52e0"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="playGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e0ff"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- 背景圆角方形 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- 顶部高光 -->
  <rect width="512" height="256" rx="112" fill="url(#glow)"/>
  <rect y="100" width="512" height="156" rx="0" fill="url(#glow)"/>

  <!-- 播放三角形 -->
  <path d="M204 160 L370 256 L204 352 Z" fill="url(#playGrad)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>

  <!-- 装饰性圆环 -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <circle cx="256" cy="256" r="185" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>

  <!-- 底部小装饰点 -->
  <circle cx="140" cy="400" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="372" cy="400" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="256" cy="420" r="3" fill="rgba(255,255,255,0.15)"/>
</svg>
